<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">

  <!-- Actor columns: User=80, AppServer=210, MCPClient=340, MCPServer=470, Claude=600, GitHub=730 -->

  <!-- Phase backgrounds -->
  <rect x="20" y="100" width="820" height="100" rx="0" fill="#eff6ff" opacity="0.5"/>
  <rect x="20" y="200" width="820" height="100" rx="0" fill="#f0fdf4" opacity="0.5"/>
  <rect x="20" y="300" width="820" height="180" rx="0" fill="#fefce8" opacity="0.5"/>
  <rect x="20" y="480" width="820" height="100" rx="0" fill="#fdf4ff" opacity="0.5"/>

  <!-- Phase labels -->
  <text x="28" y="118" font-size="11" font-weight="bold" fill="#3b82f6">A: ツール発見</text>
  <text x="28" y="218" font-size="11" font-weight="bold" fill="#16a34a">B: LLM推論</text>
  <text x="28" y="318" font-size="11" font-weight="bold" fill="#ca8a04">C: ツール実行</text>
  <text x="28" y="498" font-size="11" font-weight="bold" fill="#9333ea">D: 回答生成</text>

  <!-- Actor header boxes -->
  <rect x="40" y="30" width="90" height="44" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="85" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">User</text>

  <rect x="165" y="30" width="100" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">App Server</text>
  <text x="215" y="66" text-anchor="middle" font-size="10" fill="#3b82f6">（LLMオーケストレータ）</text>

  <rect x="295" y="30" width="100" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="345" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">MCP</text>
  <text x="345" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">Client</text>

  <rect x="425" y="30" width="100" height="44" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="475" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">MCP</text>
  <text x="475" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Server</text>

  <rect x="555" y="30" width="90" height="44" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Claude</text>

  <rect x="685" y="30" width="90" height="44" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="730" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">GitHub</text>

  <!-- Lifelines -->
  <line x1="85" y1="74" x2="85" y2="590" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="215" y1="74" x2="215" y2="590" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="345" y1="74" x2="345" y2="590" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="475" y1="74" x2="475" y2="590" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="600" y1="74" x2="600" y2="590" stroke="#d97706" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="730" y1="74" x2="730" y2="590" stroke="#9333ea" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== PHASE A: ツール発見 ===== -->

  <!-- 1. User → AppServer -->
  <line x1="85" y1="125" x2="208" y2="125" stroke="#334155" stroke-width="1.8" marker-end="url(#arrDark)"/>
  <text x="148" y="118" text-anchor="middle" font-size="10" fill="#334155">「What repositories do I have?」</text>

  <!-- 2. AppServer → MCPClient (tools/listのトリガー) -->
  <line x1="215" y1="148" x2="338" y2="148" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrB)"/>
  <text x="278" y="141" text-anchor="middle" font-size="10" fill="#3b82f6">tools/list リクエスト</text>

  <!-- 3. MCPClient → MCPServer -->
  <line x1="345" y1="168" x2="468" y2="168" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrI)"/>
  <rect x="355" y="155" width="105" height="18" rx="3" fill="#e0e7ff"/>
  <text x="408" y="168" text-anchor="middle" font-size="10" fill="#4338ca">ListToolsRequest</text>

  <!-- 4. MCPServer → MCPClient (response) -->
  <line x1="468" y1="188" x2="352" y2="188" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <rect x="355" y="175" width="105" height="18" rx="3" fill="#dcfce7"/>
  <text x="408" y="188" text-anchor="middle" font-size="10" fill="#15803d">ListToolsResult</text>

  <!-- ===== PHASE B: LLM推論 ===== -->

  <!-- 5. AppServer → Claude (query + tools) -->
  <line x1="215" y1="225" x2="593" y2="225" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrO)"/>
  <text x="405" y="218" text-anchor="middle" font-size="10" fill="#92400e">ユーザー質問 ＋ ツール定義を送信</text>

  <!-- 6. Claude → AppServer (ToolUse) -->
  <line x1="593" y1="248" x2="222" y2="248" stroke="#d97706" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrO2)"/>
  <rect x="360" y="235" width="75" height="18" rx="3" fill="#fef3c7"/>
  <text x="398" y="248" text-anchor="middle" font-size="10" fill="#92400e">ToolUse 応答</text>
  <text x="398" y="262" text-anchor="middle" font-size="9" fill="#b45309">（list_repositories を呼ぶべきと判断）</text>

  <!-- ===== PHASE C: ツール実行 ===== -->

  <!-- 7. AppServer → MCPClient -->
  <line x1="215" y1="318" x2="338" y2="318" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrB)"/>
  <text x="278" y="311" text-anchor="middle" font-size="10" fill="#3b82f6">ツール実行を依頼</text>

  <!-- 8. MCPClient → MCPServer -->
  <line x1="345" y1="338" x2="468" y2="338" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrI)"/>
  <rect x="350" y="325" width="115" height="18" rx="3" fill="#e0e7ff"/>
  <text x="408" y="338" text-anchor="middle" font-size="10" fill="#4338ca">CallToolRequest</text>

  <!-- 9. MCPServer → GitHub -->
  <line x1="475" y1="360" x2="723" y2="360" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arrP)"/>
  <text x="600" y="353" text-anchor="middle" font-size="10" fill="#7e22ce">GitHub API呼び出し</text>

  <!-- 10. GitHub → MCPServer -->
  <line x1="723" y1="380" x2="482" y2="380" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrP2)"/>
  <text x="600" y="373" text-anchor="middle" font-size="10" fill="#7e22ce">リポジトリ一覧（JSON）</text>

  <!-- 11. MCPServer → MCPClient -->
  <line x1="468" y1="400" x2="352" y2="400" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <rect x="350" y="387" width="115" height="18" rx="3" fill="#dcfce7"/>
  <text x="408" y="400" text-anchor="middle" font-size="10" fill="#15803d">CallToolResult</text>

  <!-- 12. MCPClient → AppServer -->
  <line x1="338" y1="420" x2="222" y2="420" stroke="#6366f1" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrI2)"/>
  <rect x="228" y="407" width="105" height="18" rx="3" fill="#e0e7ff"/>
  <text x="280" y="420" text-anchor="middle" font-size="10" fill="#4338ca">toolResult</text>

  <!-- 13. AppServer → Claude (tool result) -->
  <line x1="215" y1="448" x2="593" y2="448" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrO)"/>
  <text x="405" y="441" text-anchor="middle" font-size="10" fill="#92400e">ツール実行結果を送信</text>

  <!-- ===== PHASE D: 回答生成 ===== -->

  <!-- 14. Claude → AppServer (final answer) -->
  <line x1="593" y1="510" x2="222" y2="510" stroke="#d97706" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrO2)"/>
  <text x="405" y="503" text-anchor="middle" font-size="10" fill="#92400e">自然言語で回答を生成</text>

  <!-- 15. AppServer → User -->
  <line x1="208" y1="538" x2="92" y2="538" stroke="#334155" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrDark2)"/>
  <text x="148" y="531" text-anchor="middle" font-size="10" fill="#334155">「Your repositories are...」</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrDark" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#334155"/></marker>
    <marker id="arrDark2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#334155"/></marker>
    <marker id="arrB" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/></marker>
    <marker id="arrI" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/></marker>
    <marker id="arrI2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/></marker>
    <marker id="arrG" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/></marker>
    <marker id="arrO" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#d97706"/></marker>
    <marker id="arrO2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#d97706"/></marker>
    <marker id="arrP" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#9333ea"/></marker>
    <marker id="arrP2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#9333ea"/></marker>
  </defs>
</svg>
