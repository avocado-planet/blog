<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">

  <!-- Host背景 -->
  <rect x="20" y="20" width="680" height="200" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="48" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">MCP Host（例: Claude Desktop / VS Code）</text>

  <!-- LLM box -->
  <rect x="570" y="65" width="110" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="625" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">LLM</text>
  <text x="625" y="143" text-anchor="middle" font-size="11" fill="#3b82f6">推論・判断</text>

  <!-- Client boxes -->
  <rect x="60" y="70" width="120" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="120" y="99" text-anchor="middle" font-size="13" fill="#4338ca">MCP Client 1</text>

  <rect x="210" y="70" width="120" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="270" y="99" text-anchor="middle" font-size="13" fill="#4338ca">MCP Client 2</text>

  <rect x="360" y="70" width="120" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="420" y="99" text-anchor="middle" font-size="13" fill="#4338ca">MCP Client 3</text>

  <!-- LLM ↔ Clients arrows -->
  <line x1="570" y1="105" x2="480" y2="100" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrBlue)" marker-start="url(#arrBlueR)"/>
  <line x1="570" y1="115" x2="330" y2="100" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrBlue)" marker-start="url(#arrBlueR)"/>
  <line x1="570" y1="125" x2="180" y2="100" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrBlue)" marker-start="url(#arrBlueR)"/>

  <!-- Vertical arrows Client → Server -->
  <line x1="120" y1="118" x2="120" y2="268" stroke="#6366f1" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="270" y1="118" x2="270" y2="268" stroke="#6366f1" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="420" y1="118" x2="420" y2="268" stroke="#6366f1" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Server boxes -->
  <rect x="50" y="268" width="140" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">MCP Server A</text>
  <text x="120" y="312" text-anchor="middle" font-size="11" fill="#15803d">Files（ローカル）</text>

  <rect x="200" y="268" width="140" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="270" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">MCP Server B</text>
  <text x="270" y="312" text-anchor="middle" font-size="11" fill="#15803d">DB（ローカル）</text>

  <rect x="350" y="268" width="140" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="420" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">MCP Server C</text>
  <text x="420" y="312" text-anchor="middle" font-size="11" fill="#15803d">Sentry（リモート）</text>

  <!-- External resources -->
  <rect x="50" y="365" width="140" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="383" text-anchor="middle" font-size="11" fill="#475569">ローカルファイル</text>

  <rect x="200" y="365" width="140" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="270" y="383" text-anchor="middle" font-size="11" fill="#475569">ローカルDB</text>

  <rect x="350" y="365" width="140" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="420" y="383" text-anchor="middle" font-size="11" fill="#475569">外部API（Internet）</text>

  <line x1="120" y1="332" x2="120" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="270" y1="332" x2="270" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="420" y1="332" x2="420" y2="365" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- セキュリティ分離注記 -->
  <text x="530" y="300" text-anchor="middle" font-size="11" fill="#64748b">各Clientは独立した</text>
  <text x="530" y="316" text-anchor="middle" font-size="11" fill="#64748b">セッションを保持</text>
  <text x="530" y="332" text-anchor="middle" font-size="11" fill="#64748b">→ 権限が混在しない</text>

  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrBlueR" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
