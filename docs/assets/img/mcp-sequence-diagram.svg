<svg viewBox="0 0 700 580" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12">

  <!-- Phase backgrounds -->
  <rect x="0" y="95" width="700" height="95" fill="#eff6ff" opacity="0.6"/>
  <rect x="0" y="190" width="700" height="95" fill="#f0fdf4" opacity="0.6"/>
  <rect x="0" y="285" width="700" height="175" fill="#fefce8" opacity="0.6"/>
  <rect x="0" y="460" width="700" height="90" fill="#fdf4ff" opacity="0.6"/>

  <!-- Phase labels -->
  <text x="8" y="113" font-size="11" font-weight="bold" fill="#3b82f6">A: ツール発見</text>
  <text x="8" y="208" font-size="11" font-weight="bold" fill="#16a34a">B: LLM推論</text>
  <text x="8" y="303" font-size="11" font-weight="bold" fill="#ca8a04">C: ツール実行</text>
  <text x="8" y="478" font-size="11" font-weight="bold" fill="#9333ea">D: 回答生成</text>

  <!-- Actor boxes -->
  <!-- User -->
  <rect x="25" y="28" width="80" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="65" y="53" text-anchor="middle" font-weight="bold" fill="#334155">User</text>

  <!-- Host/LLM -->
  <rect x="155" y="28" width="110" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="46" text-anchor="middle" font-weight="bold" fill="#92400e">Host / LLM</text>
  <text x="210" y="61" text-anchor="middle" font-size="10" fill="#b45309">（Claude Desktop等）</text>

  <!-- MCP Client -->
  <rect x="315" y="28" width="100" height="40" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="365" y="46" text-anchor="middle" font-weight="bold" fill="#4338ca">MCP</text>
  <text x="365" y="61" text-anchor="middle" font-weight="bold" fill="#4338ca">Client</text>

  <!-- MCP Server -->
  <rect x="465" y="28" width="100" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="515" y="46" text-anchor="middle" font-weight="bold" fill="#15803d">MCP</text>
  <text x="515" y="61" text-anchor="middle" font-weight="bold" fill="#15803d">Server</text>

  <!-- GitHub -->
  <rect x="615" y="28" width="72" height="40" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="651" y="53" text-anchor="middle" font-weight="bold" fill="#7e22ce">GitHub</text>

  <!-- Lifelines -->
  <line x1="65"  y1="68" x2="65"  y2="555" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="210" y1="68" x2="210" y2="555" stroke="#d97706" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="365" y1="68" x2="365" y2="555" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="515" y1="68" x2="515" y2="555" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="651" y1="68" x2="651" y2="555" stroke="#9333ea" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== A: ツール発見 ===== -->
  <!-- 1. User → Host/LLM -->
  <line x1="65" y1="120" x2="202" y2="120" stroke="#334155" stroke-width="1.8" marker-end="url(#dk)"/>
  <text x="133" y="113" text-anchor="middle" font-size="10" fill="#334155">「What repositories do I have?」</text>

  <!-- 2. Host → MCP Client (セッション開始時に自動) -->
  <line x1="210" y1="148" x2="357" y2="148" stroke="#d97706" stroke-width="1.8" marker-end="url(#or)"/>
  <text x="283" y="141" text-anchor="middle" font-size="10" fill="#92400e">tools/list</text>

  <!-- 3. MCP Client → MCP Server -->
  <line x1="365" y1="168" x2="507" y2="168" stroke="#6366f1" stroke-width="1.8" marker-end="url(#in)"/>
  <rect x="368" y="156" width="136" height="16" rx="3" fill="#e0e7ff"/>
  <text x="436" y="168" text-anchor="middle" font-size="10" fill="#4338ca">ListToolsRequest</text>

  <!-- 4. MCP Server → MCP Client -->
  <line x1="507" y1="185" x2="373" y2="185" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#gr)"/>
  <rect x="368" y="173" width="136" height="16" rx="3" fill="#dcfce7"/>
  <text x="436" y="185" text-anchor="middle" font-size="10" fill="#15803d">ListToolsResult（ツール定義一覧）</text>

  <!-- ===== B: LLM推論 ===== -->
  <!-- 5. MCP Client → Host/LLM (ツール定義を渡す) -->
  <line x1="357" y1="213" x2="218" y2="213" stroke="#6366f1" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#in2)"/>
  <text x="283" y="206" text-anchor="middle" font-size="10" fill="#4338ca">ツール定義をHostに返す</text>

  <!-- 6. Host/LLM 内部推論（自己ループ） -->
  <path d="M210,235 Q245,235 245,248 Q245,261 210,261" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#or)"/>
  <text x="258" y="251" font-size="10" fill="#92400e">「list_repositories</text>
  <text x="258" y="264" font-size="10" fill="#92400e">を呼ぼう」と判断</text>

  <!-- ===== C: ツール実行 ===== -->
  <!-- 7. Host → MCP Client -->
  <line x1="210" y1="310" x2="357" y2="310" stroke="#d97706" stroke-width="1.8" marker-end="url(#or)"/>
  <text x="283" y="303" text-anchor="middle" font-size="10" fill="#92400e">CallTool（list_repositories）</text>

  <!-- 8. MCP Client → MCP Server -->
  <line x1="365" y1="330" x2="507" y2="330" stroke="#6366f1" stroke-width="1.8" marker-end="url(#in)"/>
  <rect x="368" y="318" width="136" height="16" rx="3" fill="#e0e7ff"/>
  <text x="436" y="330" text-anchor="middle" font-size="10" fill="#4338ca">CallToolRequest</text>

  <!-- 9. MCP Server → GitHub -->
  <line x1="515" y1="355" x2="643" y2="355" stroke="#9333ea" stroke-width="1.8" marker-end="url(#pu)"/>
  <text x="580" y="348" text-anchor="middle" font-size="10" fill="#7e22ce">GitHub API呼び出し</text>

  <!-- 10. GitHub → MCP Server -->
  <line x1="643" y1="375" x2="523" y2="375" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#pu2)"/>
  <text x="580" y="368" text-anchor="middle" font-size="10" fill="#7e22ce">リポジトリ一覧（JSON）</text>

  <!-- 11. MCP Server → MCP Client -->
  <line x1="507" y1="400" x2="373" y2="400" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#gr)"/>
  <rect x="368" y="388" width="136" height="16" rx="3" fill="#dcfce7"/>
  <text x="436" y="400" text-anchor="middle" font-size="10" fill="#15803d">CallToolResult</text>

  <!-- 12. MCP Client → Host/LLM -->
  <line x1="357" y1="425" x2="218" y2="425" stroke="#6366f1" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#in2)"/>
  <text x="283" y="418" text-anchor="middle" font-size="10" fill="#4338ca">ツール実行結果をHostに返す</text>

  <!-- ===== D: 回答生成 ===== -->
  <!-- 13. Host/LLM 内部（結果を自然言語に変換） -->
  <path d="M210,473 Q245,473 245,486 Q245,499 210,499" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#or)"/>
  <text x="258" y="486" font-size="10" fill="#92400e">結果を自然言語に変換</text>

  <!-- 14. Host → User -->
  <line x1="202" y1="525" x2="73" y2="525" stroke="#334155" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#dk2)"/>
  <text x="133" y="518" text-anchor="middle" font-size="10" fill="#334155">「Your repositories are...」</text>

  <!-- Defs -->
  <defs>
    <marker id="dk"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#334155"/></marker>
    <marker id="dk2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#334155"/></marker>
    <marker id="or"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#d97706"/></marker>
    <marker id="in"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/></marker>
    <marker id="in2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#6366f1"/></marker>
    <marker id="gr"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/></marker>
    <marker id="pu"  markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#9333ea"/></marker>
    <marker id="pu2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#9333ea"/></marker>
  </defs>
</svg>
